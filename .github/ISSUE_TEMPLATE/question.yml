name: Question / Discussion
description: Ask about the B70 patches, build setup, force aggregation, or general FluidX3D-on-Battlemage usage
title: "[Q]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For general FluidX3D-on-Battlemage questions or to discuss results.
        For confirmed bugs or different test results, use the bug report template.

  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Your hardware (if relevant)
      placeholder: "Intel Arc Pro B70 / B580 / B570 / A770 / NVIDIA / AMD"

  - type: textarea
    id: tried
    attributes:
      label: What you've tried
      description: Documentation read, commands run, configs tested
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related findings, your own attempts
